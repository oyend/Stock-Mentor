<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>트레이딩 기록장 - 원칙 매매</title>
    <link rel="stylesheet" href="dashboard-style.css">
</head>
<body>
    <div class="container">
	<div style="margin-bottom: 15px;">
        	<a href="../index.html" style="text-decoration: none; color: #1A73E8; font-size: 14px; font-weight: bold;">← 스멘이 메인으로 돌아가기</a>
   	 </div>
        <h1>트레이딩 기록장</h1>
        
        <div class="input-section">
            <input type="text" id="itemName" placeholder="종목명 (예: 삼성전자)">
            <input type="number" id="entryPrice" placeholder="진입가">
            <input type="number" id="targetPrice" placeholder="익절가">
            <input type="number" id="stopLoss" placeholder="손절가">
            <div class="button-group">
                <button id="saveBtn">기록하기</button>
                <button id="cancelBtn" style="display: none;">취소</button>
            </div>
        </div>
        
        <h2>진행 중인 매매</h2>
        <table class="data-table">
            <thead>
                <tr>
                    <th>종목명</th>
                    <th>진입가</th>
                    <th>익절/손절가 (예상 수익/손실)</th>
                    <th>관리</th>
                </tr>
            </thead>
            <tbody id="listBody">
                </tbody>
        </table>

        <h2 class="note-title">📝 오답 노트 (원칙 복기)</h2>
        <table class="data-table note-table">
            <thead>
                <tr>
                    <th>종목명</th>
                    <th>진입가</th>
                    <th>종료 상태</th>
                    <th>복기 메모</th>
                    <th>관리</th>
                </tr>
            </thead>
            <tbody id="noteBody">
                </tbody>
        </table>
    </div>

    <script src="dashboard-script.js"></script>
</body>
</html>
